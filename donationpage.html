<body>


  <div class="container" role="main">
    <p>Select Gift Frequency</p>
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked" checked>
        <label class="form-check-label" for="flexSwitchCheckChecked">Monthly</label>
    </div>

    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckChecked" checked>
        <label class="form-check-label" for="flexSwitchCheckChecked">One Time</label>
    </div>

    <br>

    <fieldset class="row mb-3">
        <legend class="col-form-label col-sm-2 pt-0">Amount</legend>
        <div class="col-sm-10">
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios1" value="25" checked>
                <label class="form-check-label" for="gridRadios1">
                    $25
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios2" value="50">
                <label class="form-check-label" for="gridRadios2">
                    $50
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios3" value="100">
                <label class="form-check-label" for="gridRadios3">
                    $100
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios3" value="250">
                <label class="form-check-label" for="gridRadios3">
                    $250
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios3" value="500">
                <label class="form-check-label" for="gridRadios3">
                    $500
                </label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" name="amount" id="gridRadios3" value="1000">
                <label class="form-check-label" for="gridRadios3">
                    $1,000
                </label>
            </div>
        </div>
    </fieldset>

    <div class="col-12">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" id="gridCheck" required>
            <label class="form-check-label" for="gridCheck">
                Yes'll generously add $0.30 each month to cover the transaction

                </label>
            </div>
        </div>
        
        <h4>Your Information</h4>

        <div class="row">

            <div class="col">
                <input type="text" class="form-control" placeholder="First name" aria-label="First name">
            </div>
            
            <div class="col">
                <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
            </div>
        </div>
            
        <div class="col-md-6">
                <label for="inputEmail4" class="form-label">Email</label>
                <input type="email" class="form-control" id="inputEmail4">
        </div>

        <button id="button" class="btn btn-primary" title="Complete your donation" onclick="checkout()">Checkout</button>


    </div>

  </body>
